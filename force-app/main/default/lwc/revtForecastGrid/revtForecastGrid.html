<template>
  <div class="forecast-grid-wrapper" onkeydown={handleKeyDown}>
    <!-- Column headers -->
    <div class="grid-header slds-grid slds-text-title_bold" role="row">
      <div class="gcol col-expand" role="columnheader"></div>
      <div
        class="gcol col-name sortable"
        role="columnheader"
        aria-sort={getAriaSort_recordName}
        onclick={handleSortName}
      >
        <span class="slds-truncate">Deal Name</span>
        <template lwc:if={isSortedByName}>
          <lightning-icon icon-name={sortIcon} size="xx-small"></lightning-icon>
        </template>
      </div>
      <!-- Dynamic display field headers with sort indicators -->
      <template for:each={displayFieldHeaders} for:item="dh">
        <div
          key={dh.key}
          class="gcol sortable"
          role="columnheader"
          data-sort-field={dh.fieldApiName}
          onclick={handleSortDisplayField}
        >
          <span>{dh.label}</span>
          <template lwc:if={dh.isSorted}>
            <lightning-icon
              icon-name={dh.sortIconName}
              size="xx-small"
              class="sort-icon"
            ></lightning-icon>
          </template>
        </div>
      </template>
      <template lwc:if={showHealthBadge}>
        <div
          class="gcol col-health sortable"
          role="columnheader"
          onclick={handleSortHealth}
          style="white-space: nowrap"
        >
          Health
        </div>
      </template>
      <!-- Dynamic metric headers with sort indicators -->
      <template for:each={sortedMetricHeaders} for:item="mh">
        <div
          key={mh.key}
          class="gcol col-metric sortable"
          role="columnheader"
          data-sort-field={mh.key}
          onclick={handleSortMetric}
        >
          <span>{mh.label}</span>
          <template lwc:if={mh.isSorted}>
            <lightning-icon
              icon-name={mh.sortIconName}
              size="xx-small"
              class="sort-icon"
            ></lightning-icon>
          </template>
        </div>
      </template>
      <div
        class="gcol col-category sortable"
        role="columnheader"
        data-sort-field="category"
        onclick={handleSortGeneric}
      >
        Category
        <template lwc:if={isSortedByCategory}>
          <lightning-icon
            icon-name={sortIcon}
            size="xx-small"
            class="sort-icon"
          ></lightning-icon>
        </template>
      </div>
      <div
        class="gcol col-override-date sortable"
        role="columnheader"
        data-sort-field="closeDateOverride"
        onclick={handleSortGeneric}
      >
        Override Close
        <template lwc:if={isSortedByOverrideClose}>
          <lightning-icon
            icon-name={sortIcon}
            size="xx-small"
            class="sort-icon"
          ></lightning-icon>
        </template>
      </div>
      <div
        class="gcol col-status sortable"
        role="columnheader"
        data-sort-field="status"
        onclick={handleSortGeneric}
      >
        Status
        <template lwc:if={isSortedByStatus}>
          <lightning-icon
            icon-name={sortIcon}
            size="xx-small"
            class="sort-icon"
          ></lightning-icon>
        </template>
      </div>
      <div class="gcol col-flags" role="columnheader"></div>
      <div class="gcol col-divergence" role="columnheader"></div>
      <template lwc:if={showInlineEstimator}>
        <div class="gcol col-estimator" role="columnheader">Est. Impact</div>
      </template>
    </div>

    <!-- Data rows -->
    <div class="grid-body" role="grid" aria-label="Forecast Grid">
      <template for:each={records} for:item="rec">
        <c-revt-forecast-row
          key={rec.recordId}
          record={rec}
          config={config}
          context={context}
          is-locked={isLocked}
          is-expanded={rec._isExpanded}
          is-dirty={rec._isDirty}
          row-error={rec._rowError}
          show-health-badge={showHealthBadge}
          show-inline-estimator={showInlineEstimator}
          period-id={periodId}
        ></c-revt-forecast-row>
      </template>
    </div>

    <!-- Pagination -->
    <div
      class="slds-grid slds-grid_align-spread slds-p-vertical_x-small pagination-bar"
    >
      <div class="slds-col">
        <span class="slds-text-body_small slds-text-color_weak">
          Showing {showingFrom}-{showingTo} of {totalCount} records
        </span>
      </div>
      <div class="slds-col">
        <lightning-button-group>
          <lightning-button
            label="Prev"
            onclick={handlePrevPage}
            disabled={isPrevDisabled}
          ></lightning-button>
          <lightning-button label={pageLabel} disabled></lightning-button>
          <lightning-button
            label="Next"
            onclick={handleNextPage}
            disabled={isNextDisabled}
          ></lightning-button>
        </lightning-button-group>
      </div>
    </div>
  </div>
</template>
