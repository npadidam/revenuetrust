<template>
  <lightning-card title="Forecast Periods" icon-name="standard:date_time">
    <div slot="actions">
      <lightning-button
        label="Generate Periods"
        variant="brand"
        onclick={handleGeneratePeriods}
      ></lightning-button>
    </div>
    <div class="slds-p-around_medium">
      <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading"></lightning-spinner>
      </template>
      <template if:false={isLoading}>
        <lightning-datatable
          key-field="Id"
          data={periods}
          columns={columns}
          onrowaction={handleRowAction}
          hide-checkbox-column
        >
        </lightning-datatable>
      </template>
    </div>
  </lightning-card>
</template>
