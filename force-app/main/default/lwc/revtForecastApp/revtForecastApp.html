<template>
  <!-- Loading spinner -->
  <template lwc:if={isLoading}>
    <lightning-spinner
      alternative-text="Loading forecast"
      size="large"
    ></lightning-spinner>
  </template>

  <div class="forecast-container slds-card">
    <!-- ═══ TOOLBAR ═══ -->
    <div
      class="toolbar-bar slds-grid slds-grid_align-spread slds-p-around_x-small"
    >
      <div class="slds-col slds-grid slds-grid_vertical-align-center">
        <span class={statusBadgeClass}>{statusLabel}</span>
      </div>
      <div class="slds-col toolbar">
        <!-- Period picker -->
        <lightning-combobox
          label="Period"
          value={selectedPeriodId}
          options={periodOptions}
          variant="label-hidden"
          onchange={handlePeriodChange}
          class="slds-m-right_x-small toolbar-picker"
          disabled={isLocked}
        ></lightning-combobox>

        <!-- Scope picker (only if multiple scopes) -->
        <template lwc:if={showScopePicker}>
          <lightning-combobox
            label="Scope"
            value={selectedScopeId}
            options={scopeOptions}
            variant="label-hidden"
            onchange={handleScopeChange}
            class="slds-m-right_x-small toolbar-picker"
            disabled={isLocked}
          ></lightning-combobox>
        </template>

        <!-- Currency toggle -->
        <template lwc:if={showCurrencyToggle}>
          <lightning-button-stateful
            label-when-off="Corporate"
            label-when-on="Local"
            icon-name-when-off="utility:moneybag"
            icon-name-when-on="utility:world"
            selected={isLocalCurrency}
            onclick={handleCurrencyToggle}
            class="slds-m-right_small"
          ></lightning-button-stateful>
        </template>
      </div>
    </div>

    <!-- ═══ DRILL-IN BREADCRUMBS ═══ -->
    <template lwc:if={isDrillIn}>
      <div
        class="slds-p-horizontal_medium slds-p-vertical_xx-small breadcrumb-bar"
      >
        <lightning-breadcrumbs onnavigate={handleBreadcrumbClick}>
          <template for:each={breadcrumbItems} for:item="bc">
            <lightning-breadcrumb
              key={bc.id}
              label={bc.label}
              name={bc.id}
            ></lightning-breadcrumb>
          </template>
        </lightning-breadcrumbs>
      </div>
    </template>

    <!-- ═══ FILTERS ═══ -->
    <div class="slds-p-horizontal_small slds-p-vertical_xx-small">
      <c-revt-forecast-filter-bar
        config={config}
        context={context}
        stage-values={distinctStages}
        records={allRecords}
        period-id={selectedPeriodId}
        scope-id={selectedScopeId}
        participant-id={currentParticipantId}
        onfilterchange={handleFilterChange}
      ></c-revt-forecast-filter-bar>
    </div>

    <!-- ═══ CATEGORY TOTALS AS FILTER CARDS ═══ -->
    <div
      class="category-cards slds-grid slds-wrap slds-gutters_xx-small slds-p-horizontal_small slds-p-bottom_xx-small"
    >
      <template for:each={categoryCards} for:item="cc">
        <div key={cc.name} class="slds-col">
          <div
            class={cc.cardClass}
            data-category={cc.apiName}
            onclick={handleCategoryCardClick}
            title={cc.tooltip}
          >
            <div class="cc-color-bar" style={cc.colorStyle}></div>
            <div class="cc-body">
              <div class="cc-header">
                <span class="cc-label">{cc.label}</span>
                <span class="cc-amount">{cc.formattedAmount}</span>
              </div>
              <div class="cc-count">{cc.countLabel}</div>
            </div>
          </div>
        </div>
      </template>
      <!-- Coverage ratio card -->
      <template lwc:if={showCoverage}>
        <div class="slds-col">
          <div class="category-card coverage-card">
            <div class="cc-body">
              <div class="cc-label">Coverage</div>
              <div class={coverageAmountClass}>{formattedCoverage}</div>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- ═══ GRID ═══ -->
    <div class="slds-p-horizontal_small">
      <c-revt-forecast-grid
        records={displayRecords}
        config={config}
        context={context}
        summary={currentSummary}
        current-page={currentPage}
        total-count={totalCount}
        page-size={pageSize}
        is-locked={isLocked}
        show-health-badge={showHealthBadge}
        show-inline-estimator={hasIncentiveData}
        period-id={selectedPeriodId}
        onsort={handleSort}
        onpagechange={handlePageChange}
        onrowchange={handleRowChange}
        ontoggleexpand={handleToggleExpand}
        onownerclick={handleOwnerDrillIn}
      ></c-revt-forecast-grid>
    </div>

    <!-- ═══ ACTION BAR ═══ -->
    <div class="slds-p-around_small slds-grid slds-grid_align-end action-bar">
      <!-- Copy dropdown -->
      <template lwc:if={showCopyButton}>
        <lightning-button-menu
          alternative-text="Copy"
          label="Copy"
          variant="neutral"
          menu-alignment="bottom-right"
          onselect={handleCopySelect}
          class="slds-m-right_x-small"
          disabled={isLocked}
        >
          <template lwc:if={canCopyFromLevel}>
            <lightning-menu-item
              label="From Previous Level (Overwrite)"
              value="level_OVERWRITE"
            ></lightning-menu-item>
            <lightning-menu-item
              label="From Previous Level (Merge)"
              value="level_MERGE"
            ></lightning-menu-item>
            <lightning-menu-item
              label="From Previous Level (Skip Edited)"
              value="level_SKIP_EDITED"
            ></lightning-menu-item>
            <lightning-menu-divider></lightning-menu-divider>
          </template>
          <lightning-menu-item
            label="From Last Forecast (Overwrite)"
            value="last_OVERWRITE"
          ></lightning-menu-item>
          <lightning-menu-item
            label="From Last Forecast (Merge)"
            value="last_MERGE"
          ></lightning-menu-item>
          <lightning-menu-item
            label="From Last Forecast (Skip Edited)"
            value="last_SKIP_EDITED"
          ></lightning-menu-item>
        </lightning-button-menu>
      </template>

      <!-- Export -->
      <lightning-button-menu
        alternative-text="Export"
        label="Export"
        icon-name="utility:download"
        variant="neutral"
        menu-alignment="bottom-right"
        onselect={handleExportSelect}
        class="slds-m-right_x-small"
        disabled={isLocked}
      >
        <lightning-menu-item
          label="CSV (.csv)"
          value="csv"
          icon-name="utility:file"
        ></lightning-menu-item>
        <lightning-menu-item
          label="Excel (.xls)"
          value="xlsx"
          icon-name="utility:spreadsheet"
        ></lightning-menu-item>
      </lightning-button-menu>

      <!-- Save -->
      <lightning-button
        label="Save"
        variant="brand"
        onclick={handleSaveClick}
        class="slds-m-right_x-small"
        disabled={isSaveDisabled}
      ></lightning-button>

      <!-- Submit -->
      <template lwc:if={canSubmit}>
        <lightning-button
          label={submitLabel}
          variant="success"
          onclick={handleSubmitClick}
          class="slds-m-right_x-small"
          disabled={isLocked}
        ></lightning-button>
      </template>

      <!-- Freeze -->
      <template lwc:if={canFreeze}>
        <lightning-button
          label={freezeLabel}
          variant="destructive"
          onclick={handleFreezeClick}
          disabled={isLocked}
        ></lightning-button>
      </template>
    </div>

    <!-- ═══ CONFIRMATION DIALOG ═══ -->
    <c-revt-confirmation-dialog
      title={dialogTitle}
      message={dialogMessage}
      confirm-label={dialogConfirmLabel}
      variant={dialogVariant}
      show-partial-full-choice={dialogShowPartialFull}
      onconfirm={handleDialogConfirm}
      oncancel={handleDialogCancel}
    ></c-revt-confirmation-dialog>

    <!-- ═══ SAVING INDICATOR ═══ -->
    <template lwc:if={isSaving}>
      <div class="saving-overlay">
        <lightning-spinner
          alternative-text="Saving"
          size="medium"
        ></lightning-spinner>
        <p class="slds-m-top_small slds-text-align_center">{savingMessage}</p>
      </div>
    </template>
  </div>
</template>
