<template>
  <template if:true={hasData}>
    <span class="sparkline-container" title={trendLabel}>
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width={width}
        height={height}
        viewBox={svgViewBox}
      >
        <polyline
          points={polylinePoints}
          fill="none"
          stroke={color}
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        ></polyline>
      </svg>
      <span class={trendLabelClass}>{trendLabel}</span>
    </span>
  </template>
</template>
